name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-check:
    name: Build and deterministic checks
    # macos-15 provides the Swift 6-capable Xcode toolchain required by Package.swift
    # while still producing a binary that targets macOS 14.2.
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Show toolchain
        run: |
          sw_vers
          uname -m
          swift --version
      - name: Build release targets
        run: swift build -c release
      - name: Run deterministic checks
        run: swift run syncordachecks
      - name: Build an ad-hoc app bundle
        env:
          SYNCORDA_VERSION: 0.0.0-ci
          SYNCORDA_BUILD: ${{ github.run_number }}
        run: ./scripts/build-app.sh
      - name: Validate bundle
        run: ./scripts/verify-bundle.sh
      - name: Upload unsigned CI artifact
        uses: actions/upload-artifact@v7
        with:
          name: Syncorda-arm64-ci
          path: dist/Syncorda.app
          retention-days: 7
